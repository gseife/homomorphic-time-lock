<!DOCTYPE html>
<html>
<head>
    <title>HTLP Demo Admin</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .dashboard { background: white; padding: 40px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); min-width: 400px; }
        button { font-size: 18px; padding: 10px 20px; background-color: #d9534f; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #results { font-size: 28px; color: #333; margin-top: 20px; font-weight: bold; }
        
        /* --- NEW: Progress Bar Styling --- */
        #progress-container { width: 100%; background-color: #e0e0e0; border-radius: 5px; margin-top: 20px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 35px; background-color: #4CAF50; text-align: center; line-height: 35px; color: white; font-weight: bold; transition: width 0.5s; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Live Demo Dashboard</h1>
        <h2>Total Votes Encrypted: <span id="vote-count">0</span></h2>
        
        <h3 id="status-msg" style="color: #555;">Waiting for votes...</h3>
        
        <button id="start-btn" onclick="startTally()">Close Voting & Start Solving</button>
        
        <div id="progress-container">
            <div id="progress-bar">0%</div>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        function startTally() {
            fetch('/start_tally', { method: 'POST' });
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('progress-container').style.display = 'block'; // Show progress bar
        }

        function pollStatus() {
            fetch('/status').then(res => res.json()).then(data => {
                document.getElementById('vote-count').innerText = data.votes;
                document.getElementById('status-msg').innerText = data.message;
                
                // NEW: Update the progress bar width and text
                if (data.solving || data.results) {
                    document.getElementById('progress-container').style.display = 'block';
                    const pctRounded = Math.round(data.progress);
                    document.getElementById('progress-bar').style.width = data.progress + "%";
                    document.getElementById('progress-bar').innerText = pctRounded + "%";
                }
                
                if(data.results) {
                    document.getElementById('results').innerHTML = 
                        `<p>🎉 Codex: ${data.results.Codex} votes</p>
                         <p>🎉 Claude: ${data.results.Claude} votes</p>`;
                }
            });
        }
        setInterval(pollStatus, 1500); // Check server slightly faster for smoother progress updates
    </script>
</body>
</html>
